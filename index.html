<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sharif Pharma</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50">
    <div class="max-w-md mx-auto min-h-screen">
        <!-- Header -->
        <div class="glass-header mb-8 text-center relative bg-indigo-600 p-8 rounded-b-[3rem] shadow-lg">
            <a href="settings.html" class="absolute top-6 right-6 bg-white/20 p-3 rounded-2xl text-white">
                <i class="fa-solid fa-sliders"></i>
            </a>
            <h1 class="text-3xl font-black text-white uppercase italic tracking-tighter">SHARIF PHARMA</h1>
            <p id="sub-title" class="text-indigo-100 text-[10px] font-bold tracking-widest uppercase opacity-80 italic">Inventory Manager</p>
        </div>
        
        <div class="px-6 space-y-4 pb-10">
            <!-- Medicine Store -->
            <a href="store.html" class="w-full bg-emerald-600 text-white p-6 rounded-[2.5rem] flex items-center justify-between shadow-xl">
                <div class="flex items-center gap-4">
                    <div class="bg-white/20 p-3 rounded-2xl"><i class="fa-solid fa-warehouse"></i></div>
                    <p id="nav-store" class="font-black italic uppercase">Medicine Store</p>
                </div>
                <i class="fa-solid fa-chevron-right opacity-50"></i>
            </a>

            <!-- এইখানে লোকাল ডাটাবেস থেকে গ্রুপ লিস্ট লোড হবে -->
            <div id="main-group-list" class="grid grid-cols-2 gap-4 text-center">
                <div class="col-span-2 py-10 text-slate-400 font-bold text-xs uppercase italic">Loading Local Data...</div>
            </div>

            <!-- Order Report -->
            <a href="history.html" class="w-full bg-slate-900 text-white p-6 rounded-[2.5rem] flex items-center justify-between shadow-2xl">
                <div class="flex items-center gap-4">
                    <div class="bg-indigo-500 p-3 rounded-2xl"><i class="fa-solid fa-file-invoice"></i></div>
                    <p id="nav-history" class="font-black italic uppercase">Order Report</p>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-500"></i>
            </a>
        </div>
    </div>

    <script type="module">
        // --- IndexedDB Setup (Local Storage) ---
        const dbName = "SharifPharmaLocalDB";
        const storeName = "groups";
        let db;

        // সার্ভিস ওয়ার্কার রেজিস্টার
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log("SW Error", err));
        }

        // ভাষা নির্ধারণ
        const lang = localStorage.getItem('appLang') || 'en';
        const t = {
            en: { manager: "Inventory Manager", store: "Medicine Store", history: "Order Report", empty: "No Data Found" },
            bn: { manager: "ইনভেন্টরি ম্যানেজার", store: "মেডিসিন স্টোর", history: "অর্ডার রিপোর্ট", empty: "ডাটা পাওয়া যায়নি" }
        }[lang];

        document.getElementById('sub-title').innerText = t.manager;
        document.getElementById('nav-store').innerText = t.store;
        document.getElementById('nav-history').innerText = t.history;

        // ডাটাবেস ওপেন করা
        const request = indexedDB.open(dbName, 1);

        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains(storeName)) {
                db.createObjectStore(storeName, { keyPath: "id", autoIncrement: true });
            }
        };

        request.onsuccess = (e) => {
            db = e.target.result;
            loadGroups(); // ডাটাবেস সফলভাবে খুললে ডাটা লোড করো
        };

        // লোকাল ডাটাবেস থেকে গ্রুপ লোড করে UI আপডেট করা
        function loadGroups() {
            const listUI = document.getElementById('main-group-list');
            const transaction = db.transaction([storeName], "readonly");
            const store = transaction.objectStore(storeName);
            const getAllRequest = store.getAll();

            getAllRequest.onsuccess = () => {
                const groups = getAllRequest.result;
                if (groups.length > 0) {
                    listUI.innerHTML = groups.map(g => `
                        <a href="order.html?group=${encodeURIComponent(g.name)}" class="bg-white p-6 rounded-[2rem] border shadow-sm active:scale-95 transition-all">
                            <i class="fa-solid fa-folder text-indigo-500 text-3xl mb-3"></i>
                            <div class="font-black text-slate-700 text-[11px] uppercase">${g.name}</div>
                        </a>
                    `).join('');
                } else {
                    listUI.innerHTML = `<div class="col-span-2 p-10 text-slate-300 font-bold uppercase text-xs">${t.empty}</div>`;
                }
            };
        }
    </script>
</body>
</html>
