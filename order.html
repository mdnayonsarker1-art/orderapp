<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Order Form - Sharif Pharma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="px-6 pt-8 max-w-md mx-auto pb-10 bg-slate-50">

    <!-- Chemist Selection View -->
    <div id="chemist-view">
        <div class="flex items-center gap-4 mb-6">
            <a href="index.html" class="bg-white p-3 rounded-2xl shadow-sm border text-indigo-900">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <h1 id="group-title" class="text-xl font-black text-slate-800 uppercase italic">Chemist</h1>
        </div>
        
        <button onclick="window.askNewName()" class="w-full mb-4 bg-indigo-600 text-white p-5 rounded-[2rem] font-black shadow-lg flex items-center justify-center gap-3 uppercase text-sm italic">
            <i class="fa-solid fa-plus-circle text-lg"></i> <span id="btn-add-manual">Add New</span>
        </button>

        <div class="relative mb-6">
            <input type="text" id="custSearch" placeholder="সার্চ করুন..." class="w-full p-5 rounded-2xl border shadow-sm outline-none !mb-0">
            <i class="fa-solid fa-magnifying-glass absolute right-5 top-5 text-slate-300"></i>
        </div>

        <div id="chemist-list" class="space-y-3">
            <p class="text-center text-slate-400 py-10 italic">Loading Chemists...</p>
        </div>
    </div>

    <!-- Order Form View -->
    <div id="form-view" class="hidden">
        <div class="flex justify-between items-center mb-6">
            <button onclick="window.goBackToChemist()" class="font-bold text-indigo-600 flex items-center gap-2 bg-white px-4 py-2 rounded-xl shadow-sm border">
                <i class="fa-solid fa-arrow-left"></i> <span id="btn-back">Back</span>
            </button>
            <input type="date" id="orderDate" class="p-2 rounded-xl border font-bold text-slate-600 text-xs shadow-sm">
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border-t-8 border-indigo-600 mb-6">
            <h2 id="selected-chemist-name" class="text-2xl font-black text-slate-800 uppercase italic mb-6 text-center"></h2>
            <input type="text" id="product-name" list="med-list-data" placeholder="মেডিসিনের নাম..." class="w-full p-4 rounded-xl border mb-3 outline-none">
            <input type="number" id="quantity" placeholder="পরিমাণ" class="w-full p-4 rounded-xl border mb-4 outline-none">
            <button id="addToCartBtn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg">অ্যাড করুন</button>
        </div>

        <!-- Cart Table -->
        <div class="bg-white rounded-[2rem] shadow-sm overflow-hidden border">
            <table class="w-full">
                <tbody id="cart-items" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>

        <button id="saveOrderBtn" class="w-full mt-6 bg-emerald-600 text-white py-6 rounded-[2rem] font-black text-xl shadow-2xl uppercase">অর্ডার সেভ করুন</button>
    </div>

    <datalist id="med-list-data"></datalist>

    <script type="module">
        import { openDB } from './config.js';

        const translations = {
            en: { manualAdd: "Add New (Manual Entry)", searchPl: "Search Chemist...", back: "Back", medPl: "Medicine Name...", qtyPl: "Quantity", addBtn: "Add to Cart", saveBtn: "Save Order", cartEmpty: "Cart is empty!", orderSaved: "Order Saved!", promptName: "Enter Chemist Name:", notInList: "Not in list", quickAdd: "Quick Add" },
            bn: { manualAdd: "নতুন নাম যোগ করুন", searchPl: "সার্চ করুন...", back: "ব্যাক", medPl: "মেডিসিনের নাম...", qtyPl: "পরিমাণ", addBtn: "অ্যাড করুন", saveBtn: "অর্ডার সেভ করুন", cartEmpty: "কার্ট খালি!", orderSaved: "অর্ডার সেভ হয়েছে!", promptName: "কেমিস্টের নাম লিখুন:", notInList: "লিস্টে নেই", quickAdd: "দ্রুত যোগ" }
        };

        const currentLang = localStorage.getItem('appLang') || 'en';
        const t = translations[currentLang];
        const todayStr = new Date().toISOString().split('T')[0];

        let db, cart = [], currentChemist = '', allCustomers = [];
        const params = new URLSearchParams(window.location.search);
        const currentGroup = params.get('group') || "No Group";

        async function init() {
            db = await openDB();
            applyLanguage();
            document.getElementById('orderDate').value = todayStr;
            document.getElementById('group-title').innerText = currentGroup;
            loadInitialData();
        }

        function applyLanguage() {
            document.getElementById('btn-add-manual').innerText = t.manualAdd;
            document.getElementById('custSearch').placeholder = t.searchPl;
            document.getElementById('btn-back').innerText = t.back;
            document.getElementById('product-name').placeholder = t.medPl;
            document.getElementById('quantity').placeholder = t.qtyPl;
            document.getElementById('addToCartBtn').innerText = t.addBtn;
            document.getElementById('saveOrderBtn').innerText = t.saveBtn;
        }

        async function loadInitialData() {
            // ১. কাস্টমার/কেমিস্ট লিস্ট লোড (IndexedDB থেকে)
            const tx = db.transaction("groups", "readonly");
            const store = tx.objectStore("groups");
            
            // মনে করুন 'groups' স্টোরে কাস্টমার ডাটাও আছে অথবা আলাদা স্টোর থেকে আসছে
            // আপাতত আপনার আগের লজিক অনুযায়ী ফিল্টার করছি
            const groupsData = await new Promise(r => {
                const req = store.getAll();
                req.onsuccess = () => r(req.result);
            });

            // এখানে আপনার মাস্টার ডাটা স্ট্রাকচার অনুযায়ী কাস্টমার ফিল্টার হবে
            // যদি কাস্টমারদের আলাদা টেবিল থাকে তবে সেটি ব্যবহার করা হবে
            // উদাহরণস্বরূপ, আমরা ধরে নিচ্ছি সব কাস্টমার ডাটা 'groups' এ আছে (আপনার আগের Firestore লজিক অনুযায়ী)
            allCustomers = []; 
            groupsData.forEach(g => {
                if(g.name === currentGroup && g.customers) {
                    allCustomers = g.customers;
                }
            });

            renderChemists(allCustomers);

            // মেডিসিন লিস্ট লোড (অটোসাজেশন এর জন্য)
            // এটিও আপনার ডাটাবেস থেকে আসতে পারে
            // document.getElementById('med-list-data').innerHTML = ...
        }

        function renderChemists(list, searchText = '') {
            const container = document.getElementById('chemist-list');
            if (list.length === 0 && searchText.length > 0) {
                container.innerHTML = `
                    <div class="p-8 bg-indigo-50 border-2 border-dashed border-indigo-200 rounded-[2.5rem] text-center">
                        <p class="text-slate-500 font-bold mb-4 uppercase text-[10px] italic">"${searchText}" ${t.notInList}</p>
                        <button onclick="window.openForm('${searchText}')" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black text-xs shadow-lg uppercase">
                            <i class="fa-solid fa-plus mr-2"></i> ${t.quickAdd}: ${searchText}
                        </button>
                    </div>`;
            } else {
                container.innerHTML = list.map(c => `
                    <button onclick="window.openForm('${c.name || c}')" class="w-full text-left p-6 bg-white border rounded-[2rem] font-black text-slate-700 shadow-sm uppercase italic">
                        ${c.name || c}
                    </button>`).join('');
            }
        }

        document.getElementById('custSearch').oninput = (e) => {
            const search = e.target.value.toUpperCase();
            const matched = allCustomers.filter(c => {
                const name = (c.name || c).toUpperCase();
                return name.includes(search);
            });
            renderChemists(matched, search);
        };

        window.askNewName = () => {
            const name = prompt(t.promptName);
            if (name && name.trim() !== "") window.openForm(name.trim());
        };

        window.openForm = (name) => {
            currentChemist = name.toUpperCase();
            cart = [];
            renderCart();
            document.getElementById('chemist-view').classList.add('hidden');
            document.getElementById('form-view').classList.remove('hidden');
            document.getElementById('selected-chemist-name').innerText = currentChemist;
            document.getElementById('custSearch').value = '';
        };

        window.goBackToChemist = () => {
            document.getElementById('form-view').classList.add('hidden');
            document.getElementById('chemist-view').classList.remove('hidden');
        };

        document.getElementById('addToCartBtn').onclick = () => {
            const p = document.getElementById('product-name').value.toUpperCase();
            const q = document.getElementById('quantity').value;
            if(p && q) {
                cart.push({product: p, qty: q});
                renderCart();
                document.getElementById('product-name').value = '';
                document.getElementById('quantity').value = '';
                document.getElementById('product-name').focus();
            }
        };

        function renderCart() {
            document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
                <tr class="flex justify-between items-center p-5">
                    <td class="font-bold uppercase text-sm">${item.product}</td>
                    <td class="font-black text-indigo-600">x${item.qty}</td>
                    <td><button onclick="window.removeCartItem(${i})" class="text-red-400 p-2 text-xl">✕</button></td>
                </tr>`).join('');
        }

        window.removeCartItem = (i) => { cart.splice(i,1); renderCart(); };

        document.getElementById('saveOrderBtn').onclick = async () => {
            if(!cart.length) return alert(t.cartEmpty);
            const selectedDate = document.getElementById('orderDate').value;
            
            const orderObj = {
                group: currentGroup,
                chemist: currentChemist,
                items: cart,
                date: selectedDate,
                struckItems: [],
                timestamp: Date.now()
            };

            const tx = db.transaction("orders", "readwrite");
            const store = tx.objectStore("orders");
            store.add(orderObj);

            tx.oncomplete = () => {
                alert(t.orderSaved);
                window.goBackToChemist();
            };
            
            tx.onerror = () => alert("Error saving order!");
        };

        init();
    </script>
</body>
</html>
