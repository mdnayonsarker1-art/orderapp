<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অর্ডার ফর্ম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="px-6 pt-8 max-w-md mx-auto">
    <div id="chemist-view">
        <div class="flex items-center gap-4 mb-6">
            <a href="index.html" class="bg-white p-3 rounded-2xl shadow-sm border text-indigo-900"><i class="fa-solid fa-chevron-left"></i></a>
            <h1 id="group-title" class="text-xl font-black text-slate-800 uppercase italic">Chemist</h1>
        </div>
        <input type="text" id="custSearch" placeholder="সার্চ করুন..." class="large-input shadow-sm">
        <div id="chemist-list" class="space-y-3"></div>
    </div>

    <div id="form-view" class="hidden">
        <button onclick="location.reload()" class="font-bold text-indigo-600 mb-6 flex items-center gap-2 bg-white px-4 py-2 rounded-xl shadow-sm"><i class="fa-solid fa-arrow-left"></i> ব্যাক</button>
        <div class="setup-card border-t-8 border-indigo-600">
            <h2 id="selected-chemist-name" class="text-2xl font-black text-slate-800 uppercase italic mb-6 text-center"></h2>
            <input type="text" id="product-name" list="med-list-data" placeholder="মেডিসিনের নাম..." class="large-input">
            <input type="number" id="quantity" placeholder="পরিমাণ" class="large-input">
            <button id="addToCartBtn" class="save-btn bg-indigo-600">অ্যাড করুন</button>
        </div>
        <div class="setup-card p-0 overflow-hidden"><table class="w-full"><tbody id="cart-items" class="divide-y divide-slate-100"></tbody></table></div>
        <button id="saveOrderBtn" class="w-full mt-4 bg-emerald-600 text-white py-6 rounded-3xl font-black text-xl shadow-2xl uppercase">অর্ডার সেভ করুন</button>
    </div>

    <datalist id="med-list-data"></datalist>

    <script type="module">
        import { db, DOC_REF, today } from './config.js';
        import { onSnapshot, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const params = new URLSearchParams(window.location.search);
        const currentGroup = params.get('group');
        let cart = [], currentChemist = '', masterData = {};

        document.getElementById('group-title').innerText = currentGroup;

        onSnapshot(DOC_REF, (snap) => {
            masterData = snap.data();
            const filtered = (masterData.customers || []).filter(c => c.group === currentGroup);
            renderChemists(filtered);
            document.getElementById('med-list-data').innerHTML = (masterData.medicines || []).map(m => `<option value="${m}">`).join('');
        });

        function renderChemists(list) {
            document.getElementById('chemist-list').innerHTML = list.map(c => `
                <button onclick="window.openForm('${c.name}')" class="w-full text-left p-6 bg-white border rounded-[2rem] font-black text-slate-700 shadow-sm uppercase italic">${c.name}</button>
            `).join('');
        }

        window.openForm = (name) => {
            currentChemist = name;
            document.getElementById('chemist-view').classList.add('hidden');
            document.getElementById('form-view').classList.remove('hidden');
            document.getElementById('selected-chemist-name').innerText = name;
        };

        document.getElementById('addToCartBtn').onclick = () => {
            const p = document.getElementById('product-name').value.toUpperCase();
            const q = document.getElementById('quantity').value;
            if(p && q) {
                cart.push({product: p, qty: q});
                renderCart();
                document.getElementById('product-name').value = '';
                document.getElementById('quantity').value = '';
            }
        };

        function renderCart() {
            document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
                <tr class="flex justify-between items-center p-5">
                    <td class="font-bold uppercase">${item.product}</td>
                    <td class="font-black text-indigo-600">x${item.qty}</td>
                    <td><button onclick="window.removeCartItem(${i})" class="text-red-400">✕</button></td>
                </tr>
            `).join('');
        }

        window.removeCartItem = (i) => { cart.splice(i,1); renderCart(); };

        document.getElementById('saveOrderBtn').onclick = async () => {
            if(!cart.length) return;
            await addDoc(collection(db, "orders"), {
                group: currentGroup, chemist: currentChemist, items: cart, date: today, timestamp: new Date().getTime()
            });
            alert("Order Saved!");
            location.href = "index.html";
        };
    </script>
</body>
</html>
