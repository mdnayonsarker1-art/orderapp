<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings - Sharif Pharma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .lang-opt { transition: all 0.3s ease; border: 2px solid #f1f5f9; }
        .lang-opt.active { border-color: #4f46e5; background-color: #f5f3ff; }
    </style>
</head>
<body class="px-6 pt-8 max-w-md mx-auto pb-20 bg-slate-50">

    <div class="flex items-center gap-4 mb-8">
        <a href="index.html" class="bg-white p-3 rounded-2xl shadow-sm border text-indigo-900">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h1 id="main-title" class="text-2xl font-black text-slate-800 uppercase italic">Settings</h1>
    </div>

    <!-- ল্যাঙ্গুয়েজ সেটিংস -->
    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm mb-6 border">
        <h3 id="lang-title" class="text-[10px] font-black text-indigo-600 uppercase mb-4 tracking-widest">Language / ভাষা</h3>
        <div class="grid grid-cols-2 gap-3">
            <div onclick="window.changeLanguage('en')" id="en-btn" class="lang-opt p-3 rounded-2xl text-center cursor-pointer">
                <span class="block font-bold text-slate-700">English</span>
            </div>
            <div onclick="window.changeLanguage('bn')" id="bn-btn" class="lang-opt p-3 rounded-2xl text-center cursor-pointer">
                <span class="block font-bold text-slate-700">বাংলা</span>
            </div>
        </div>
    </div>

    <!-- গ্রুপ সেটিংস -->
    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm mb-6 border">
        <h3 id="group-title" class="text-[10px] font-black text-indigo-600 uppercase mb-4 tracking-widest">GROUPS</h3>
        <div class="flex gap-2">
            <input type="text" id="gInput" placeholder="Ex: GB-1" class="w-full p-3 rounded-xl border-2 flex-1 outline-none text-sm">
            <button id="addGroupBtn" class="bg-indigo-950 text-white px-5 rounded-xl font-black text-xs">ADD</button>
        </div>
        <div id="gList" class="flex flex-wrap gap-2 mt-4"></div>
    </div>

    <!-- কাস্টমার সেটিংস -->
    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm mb-6 border">
        <h3 id="customer-title" class="text-[10px] font-black text-emerald-600 uppercase mb-4 tracking-widest">CUSTOMERS</h3>
        <select id="cGroupSelect" class="w-full p-4 rounded-2xl border mb-3 outline-none text-sm bg-slate-50"></select>
        <textarea id="cInputBulk" rows="2" placeholder="কাস্টমারের নাম (কমা দিয়ে লিখুন)..." class="w-full p-4 rounded-2xl border mb-3 outline-none text-sm bg-slate-50"></textarea>
        <button id="saveCustBtn" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg text-sm">SAVE CUSTOMERS</button>
        
        <div id="toggleCustView" class="text-center mt-4 text-[10px] font-bold text-slate-400 cursor-pointer uppercase tracking-widest">
            <span id="show-text">SHOW & DELETE</span> <i class="fa-solid fa-chevron-down ml-1"></i>
        </div>
        <div id="cViewWrap" class="hidden mt-4">
            <div id="cSettingsGroupButtons" class="flex flex-wrap gap-2 mb-4"></div>
            <div id="cSettingsListUI" class="space-y-2 border-t pt-4 max-h-[250px] overflow-y-auto"></div>
        </div>
    </div>

    <!-- মেডিসিন সেটিংস -->
    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border">
        <h3 id="med-title" class="text-[10px] font-black text-orange-600 uppercase mb-4 tracking-widest">MEDICINE</h3>
        <textarea id="mInputBulk" rows="2" placeholder="মেডিসিন লিস্ট (কমা দিয়ে লিখুন)..." class="w-full p-4 rounded-2xl border mb-3 outline-none text-sm bg-slate-50"></textarea>
        <button id="saveMedBtn" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg text-sm">SAVE MEDICINE</button>
        <div id="mListUI" class="flex flex-wrap gap-2 mt-4"></div>
    </div>

    <script type="module">
        import { openDB } from './config.js';

        let db;
        let allGroups = [];
        let allMeds = [];

        const translations = {
            en: { mainTitle: "Settings", langTitle: "Language / ভাষা", groupTitle: "Groups", custTitle: "Customers", medTitle: "Medicine", addBtn: "ADD", saveCust: "SAVE CUSTOMERS", saveMed: "SAVE MEDICINE", showDel: "SHOW & DELETE", selGrp: "Select Group First", custPl: "Customer names (comma separated)...", medPl: "Medicine list (comma separated)...", delConfirm: "Delete this item?", custAdded: "Customers Added!" },
            bn: { mainTitle: "সেটিংস", langTitle: "ভাষা / Language", groupTitle: "গ্রুপসমূহ", custTitle: "কাস্টমার", medTitle: "মেডিসিন", addBtn: "যোগ", saveCust: "কাস্টমার সেভ করুন", saveMed: "মেডিসিন সেভ করুন", showDel: "দেখান ও ডিলিট করুন", selGrp: "প্রথমে গ্রুপ সিলেক্ট করুন", custPl: "কাস্টমারের নাম (কমা দিয়ে লিখুন)...", medPl: "মেডিসিন লিস্ট (কমা দিয়ে লিখুন)...", delConfirm: "এটি ডিলিট করতে চান?", custAdded: "কাস্টমার যোগ হয়েছে!" }
        };

        const currentLang = localStorage.getItem('appLang') || 'en';
        const t = translations[currentLang];

        async function init() {
            db = await openDB();
            applyLanguage();
            loadData();
        }

        window.changeLanguage = (lang) => {
            localStorage.setItem('appLang', lang);
            window.location.reload();
        };

        function applyLanguage() {
            const enBtn = document.getElementById('en-btn');
            const bnBtn = document.getElementById('bn-btn');
            if(currentLang === 'bn') { bnBtn.classList.add('active'); } else { enBtn.classList.add('active'); }

            document.getElementById('main-title').innerText = t.mainTitle;
            document.getElementById('lang-title').innerText = t.langTitle;
            document.getElementById('group-title').innerText = t.groupTitle;
            document.getElementById('customer-title').innerText = t.custTitle;
            document.getElementById('med-title').innerText = t.medTitle;
            document.getElementById('addGroupBtn').innerText = t.addBtn;
            document.getElementById('saveCustBtn').innerText = t.saveCust;
            document.getElementById('saveMedBtn').innerText = t.saveMed;
            document.getElementById('show-text').innerText = t.showDel;
            document.getElementById('cInputBulk').placeholder = t.custPl;
            document.getElementById('mInputBulk').placeholder = t.medPl;
        }

        async function loadData() {
            const tx = db.transaction(["groups"], "readonly");
            const store = tx.objectStore("groups");
            
            allGroups = await new Promise(r => {
                const req = store.getAll();
                req.onsuccess = () => r(req.result);
            });

            // মেডিসিন ডাটা চাইলে আলাদা স্টোর থেকে আনা যায়, 
            // বর্তমানে আপনার লজিক সহজ রাখতে আমি 'groups' এর সাথেই মেডিসিন লিস্ট হ্যান্ডেল করছি অথবা আলাদা এন্ট্রি হিসেবে।
            renderUI();
        }

        function renderUI() {
            // Render Groups List
            document.getElementById('gList').innerHTML = allGroups.map(g => `
                <span class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-[10px] font-black uppercase flex items-center gap-1">
                    ${g.name} <i onclick="window.removeGroup(${g.id})" class="fa-solid fa-xmark cursor-pointer"></i>
                </span>
            `).join('');

            // Update Dropdown
            document.getElementById('cGroupSelect').innerHTML = `<option value="">${t.selGrp}</option>` + 
                allGroups.map(g => `<option value="${g.name}">${g.name}</option>`).join('');
            
            // Render Customer View Buttons
            document.getElementById('cSettingsGroupButtons').innerHTML = allGroups.map(g => `
                <button onclick="window.viewCustomersByGroup('${g.name}')" class="bg-slate-100 text-slate-500 px-3 py-2 rounded-xl text-[10px] font-black uppercase">${g.name}</button>
            `).join('');
        }

        // Add Group
        document.getElementById('addGroupBtn').onclick = async () => {
            const name = document.getElementById('gInput').value.trim().toUpperCase();
            if (name) {
                const tx = db.transaction("groups", "readwrite");
                tx.objectStore("groups").add({ name: name, customers: [] });
                tx.oncomplete = () => {
                    document.getElementById('gInput').value = '';
                    loadData();
                };
            }
        };

        window.removeGroup = async (id) => {
            if (confirm(t.delConfirm)) {
                const tx = db.transaction("groups", "readwrite");
                tx.objectStore("groups").delete(id);
                tx.oncomplete = () => loadData();
            }
        };

        // Add Customers to Group
        document.getElementById('saveCustBtn').onclick = async () => {
            const grpName = document.getElementById('cGroupSelect').value;
            const txt = document.getElementById('cInputBulk').value;
            if (!grpName || !txt) return alert(t.selGrp);

            const names = txt.split(/[,\n]/).map(n => n.trim().toUpperCase()).filter(n => n);
            
            const tx = db.transaction("groups", "readwrite");
            const store = tx.objectStore("groups");
            
            // প্রথমে ওই গ্রুপটি খুঁজে বের করি
            const groupObj = allGroups.find(g => g.name === grpName);
            if (groupObj) {
                if(!groupObj.customers) groupObj.customers = [];
                groupObj.customers.push(...names.map(n => ({name: n})));
                store.put(groupObj);
                tx.oncomplete = () => {
                    document.getElementById('cInputBulk').value = '';
                    alert(t.custAdded);
                    loadData();
                };
            }
        };

        window.viewCustomersByGroup = (grpName) => {
            const group = allGroups.find(g => g.name === grpName);
            const list = group.customers || [];
            document.getElementById('cSettingsListUI').innerHTML = list.map((c, idx) => `
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl border mb-1">
                    <span class="text-sm font-bold uppercase">${c.name}</span>
                    <i onclick="window.deleteCustomer('${grpName}', ${idx})" class="fa-solid fa-trash text-red-400 p-1 cursor-pointer"></i>
                </div>
            `).join('');
        };

        window.deleteCustomer = async (grpName, index) => {
            if (confirm(t.delConfirm)) {
                const group = allGroups.find(g => g.name === grpName);
                group.customers.splice(index, 1);
                const tx = db.transaction("groups", "readwrite");
                tx.objectStore("groups").put(group);
                tx.oncomplete = () => window.viewCustomersByGroup(grpName);
            }
        };

        document.getElementById('toggleCustView').onclick = () => {
            document.getElementById('cViewWrap').classList.toggle('hidden');
        };

        init();
    </script>
</body>
</html>
