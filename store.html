<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মেডিসিন স্টোর - Sharif Pharma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .qty-badge { background: #10b981; color: white; padding: 4px 10px; border-radius: 10px; font-weight: 900; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 400px; border-radius: 2rem; padding: 25px; max-height: 80vh; overflow-y: auto; }
        .row-hover:active { background-color: #f0fdf4; transition: 0.2s; }
        @media print { .no-pdf { display: none !important; } }
    </style>
</head>
<body class="px-6 pt-8 max-w-md mx-auto pb-10">
    
    <div class="flex items-center gap-4 mb-6 no-pdf">
        <a href="index.html" class="bg-white p-3 rounded-2xl shadow-sm border text-indigo-600">
            <i class="fa-solid fa-chevron-left"></i>
        </a>
        <h1 class="text-2xl font-black text-slate-800 uppercase italic">Stock Store</h1>
    </div>

    <div class="setup-card !p-4 bg-emerald-50/50 border-none mb-6 no-pdf">
        <div class="grid grid-cols-2 gap-2 mb-3">
            <div>
                <label class="text-[9px] font-bold text-slate-400 ml-2 uppercase">From Date</label>
                <input type="date" id="storeFromDate" class="large-input !p-3 !text-xs !mb-0">
            </div>
            <div>
                <label class="text-[9px] font-bold text-slate-400 ml-2 uppercase">To Date</label>
                <input type="date" id="storeToDate" class="large-input !p-3 !text-xs !mb-0">
            </div>
        </div>

        <div class="mb-4">
            <label class="text-[9px] font-bold text-slate-400 ml-2 uppercase">Select Group</label>
            <select id="storeGroupFilter" class="large-input !text-sm !mb-0 !p-4">
                <option value="ALL">All Groups</option>
            </select>
        </div>

        <div class="flex gap-2">
            <button id="filterBtn" class="flex-1 bg-emerald-600 text-white py-4 rounded-2xl font-black uppercase text-xs shadow-lg">ফিল্টার স্টক</button>
            <button id="savePdfBtn" class="bg-indigo-600 text-white px-6 rounded-2xl shadow-lg no-pdf">
                <i class="fa-solid fa-file-pdf"></i>
            </button>
        </div>
    </div>

    <div class="relative mb-4 no-pdf">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
        <input type="text" id="storeSearch" placeholder="মেডিসিন খুঁজুন..." class="large-input shadow-sm !pl-12 !mb-0">
    </div>

    <div id="stock-report-print" class="bg-white rounded-3xl border shadow-sm overflow-hidden p-2">
        <div class="hidden show-on-print text-center mb-4 border-b pb-2">
            <h2 class="text-xl font-black text-indigo-700">SHARIF PHARMA - STOCK REPORT</h2>
            <p id="print-date-info" class="text-[10px] text-slate-500 uppercase font-bold"></p>
        </div>
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-slate-50 border-b">
                    <th class="p-4 text-[10px] uppercase text-slate-500 font-bold">Medicine Name</th>
                    <th class="p-4 text-center text-[10px] uppercase text-slate-500 font-bold">Total Qty</th>
                </tr>
            </thead>
            <tbody id="store-table-body" class="divide-y">
                <tr><td colspan="2" class="p-10 text-center text-slate-400">ফিল্টার বাটনে ক্লিক করুন</td></tr>
            </tbody>
        </table>
    </div>

    <div id="detailsModal" class="modal no-pdf">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modalMedName" class="text-lg font-black text-emerald-700 italic uppercase"></h2>
                <button onclick="window.closeModal()" class="text-slate-400 text-xl"><i class="fa-solid fa-circle-xmark"></i></button>
            </div>
            <div id="modalDetailsBody" class="space-y-3"></div>
        </div>
    </div>

    <script type="module">
        import { db, DOC_REF, today } from './config.js';
        import { collection, getDocs, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ডিফল্টভাবে আজকের তারিখ ইনপুট ফিল্ডে বসানো হচ্ছে
        document.getElementById('storeFromDate').value = today;
        document.getElementById('storeToDate').value = today;

        let fullStock = {};
        let medDetails = {};

        // গ্রুপ লিস্ট লোড
        onSnapshot(DOC_REF, (snap) => {
            if(snap.exists()){
                const groups = snap.data().groups || [];
                document.getElementById('storeGroupFilter').innerHTML = '<option value="ALL">All Groups</option>' + 
                    groups.map(g => `<option value="${g}">${g}</option>`).join('');
            }
        });

        async function loadStock() {
            const from = document.getElementById('storeFromDate').value;
            const to = document.getElementById('storeToDate').value;
            const selectedGroup = document.getElementById('storeGroupFilter').value;
            const tableBody = document.getElementById('store-table-body');
            
            tableBody.innerHTML = '<tr><td colspan="2" class="p-10 text-center font-bold text-slate-400 animate-pulse">লোড হচ্ছে...</td></tr>';

            try {
                const q = query(collection(db, "orders"), where("date", ">=", from), where("date", "<=", to));
                const snap = await getDocs(q);
                
                fullStock = {};
                medDetails = {};

                snap.forEach(doc => {
                    const order = doc.data();
                    if (selectedGroup !== "ALL" && order.group !== selectedGroup) return;

                    const chemistName = order.chemist;
                    order.items.forEach(it => {
                        const medName = it.product.toUpperCase().trim();
                        const qty = parseInt(it.qty) || 0;
                        fullStock[medName] = (fullStock[medName] || 0) + qty;
                        if (!medDetails[medName]) medDetails[medName] = [];
                        medDetails[medName].push({ chemist: chemistName, qty: qty });
                    });
                });
                renderTable();
            } catch (err) {
                tableBody.innerHTML = '<tr><td colspan="2" class="p-10 text-center text-red-500">ডাটা লোড করতে সমস্যা হয়েছে</td></tr>';
            }
        }

        function renderTable(search = '') {
            const names = Object.keys(fullStock).filter(n => n.includes(search.toUpperCase())).sort();
            const tableBody = document.getElementById('store-table-body');
            if (names.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="2" class="p-10 text-center text-slate-400">কোন ডাটা পাওয়া যায়নি</td></tr>';
                return;
            }
            tableBody.innerHTML = names.map(name => `
                <tr class="row-hover cursor-pointer" onclick="window.showDetails('${name}')">
                    <td class="p-4 font-bold text-slate-700 text-sm uppercase">${name}</td>
                    <td class="p-4 text-center"><span class="qty-badge">${fullStock[name]}</span></td>
                </tr>
            `).join('');
        }

        // PDF সেভ
        document.getElementById('savePdfBtn').onclick = () => {
            const element = document.getElementById('stock-report-print');
            const from = document.getElementById('storeFromDate').value;
            const to = document.getElementById('storeToDate').value;
            const group = document.getElementById('storeGroupFilter').value;
            
            document.getElementById('print-date-info').innerText = `Date Range: ${from} to ${to} | Group: ${group}`;
            
            const opt = {
                margin: 10,
                filename: `Stock_Report_${from}_to_${to}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            if(Object.keys(fullStock).length === 0) return alert("প্রথমে স্টক ফিল্টার করুন!");
            html2pdf().set(opt).from(element).save();
        };

        window.showDetails = (medName) => {
            const modal = document.getElementById('detailsModal');
            document.getElementById('modalMedName').innerText = medName;
            const list = medDetails[medName] || [];
            document.getElementById('modalDetailsBody').innerHTML = list.map(item => `
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <span class="text-xs font-bold text-slate-600 uppercase">${item.chemist}</span>
                    <span class="font-black text-emerald-600">x${item.qty}</span>
                </div>
            `).join('');
            modal.style.display = 'flex';
        };

        window.closeModal = () => { document.getElementById('detailsModal').style.display = 'none'; };
        document.getElementById('storeSearch').oninput = (e) => renderTable(e.target.value);
        document.getElementById('filterBtn').onclick = loadStock;
        window.onclick = (e) => { if (e.target == document.getElementById('detailsModal')) closeModal(); };
        
        // পেজ লোড হওয়ার সাথে সাথেই আজকের স্টক অটোমেটিক দেখানোর জন্য এই লাইনটি দিতে পারেন
        loadStock(); 
    </script>
</body>
</html>
